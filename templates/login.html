<!DOCTYPE html>
<html>
<head>
    <title>Login - NeoAI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle at top, #0b1220, #05070f);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login to NeoAI</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register">Register</a></p>
</div>

</body>
</html>
