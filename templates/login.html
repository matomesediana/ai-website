<!DOCTYPE html>
<html>
<head>
    <title>Login - NeoAI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle at top, #0b1220, #05070f);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 {
            color: #93c5fd;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            cursor: pointer;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        .link {
            margin-top: 15px;
            font-size: 13px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="logo">⚡ NeoAI</div>
    <div class="subtitle">Secure AI Chat System</div>

    <h2>Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>

</div>

</body>
</html>
